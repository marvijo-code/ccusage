name: update pricing

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  update-pricing:
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout (for local actions)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up git bot identity
        id: bot
        uses: ./.github/actions/setup-git-bot
        with:
          app-id: ${{ secrets.CCUSAGE_UPDATER_APP_ID }}
          private-key: ${{ secrets.CCUSAGE_UPDATER_APP_PRIVATE_KEY }}
      - name: Checkout (with bot token)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.bot.outputs.token }}
      - uses: ./.github/actions/setup-nix-cache
      - name: Capture current LiteLLM pricing JSON
        run: |
          rev="$(jq -r '.nodes.litellm.locked.rev' flake.lock)"
          curl --fail --location --silent --show-error \
            "https://raw.githubusercontent.com/BerriAI/litellm/${rev}/model_prices_and_context_window.json" \
            --output /tmp/litellm-pricing-before.json
      - name: Update LiteLLM pricing input
        run: |
          nix flake update litellm
      - name: Skip lock-only LiteLLM updates
        run: |
          rev="$(jq -r '.nodes.litellm.locked.rev' flake.lock)"
          curl --fail --location --silent --show-error \
            "https://raw.githubusercontent.com/BerriAI/litellm/${rev}/model_prices_and_context_window.json" \
            --output /tmp/litellm-pricing-after.json

          if cmp --silent /tmp/litellm-pricing-before.json /tmp/litellm-pricing-after.json; then
            echo "LiteLLM pricing JSON is unchanged; skipping PR."
            git checkout -- flake.lock
          fi
      - name: Validate updated pricing snapshot
        run: |
          if git diff --quiet; then
            echo "Pricing snapshot is already up to date."
            exit 0
          fi
          nix develop --command just check
      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
        run: |
          if git diff --quiet; then
            echo "Pricing snapshot is already up to date."
            exit 0
          fi

          branch="automation/litellm-pricing"
          git checkout -B "$branch"
          git add flake.lock
          git commit -m "chore(pricing): update LiteLLM snapshot"
          git push --force origin "$branch"

          body="$(printf '%s\n' \
            'Updates the locked LiteLLM pricing input used by Nix builds.' \
            '' \
            'Validation:' \
            '- just check')"

          if gh pr view "$branch" >/dev/null 2>&1; then
            printf '%s\n' "$body" | gh pr edit "$branch" --title "chore(pricing): update LiteLLM snapshot" --body-file -
          else
            printf '%s\n' "$body" | gh pr create --base main --head "$branch" --title "chore(pricing): update LiteLLM snapshot" --body-file -
          fi

          gh pr merge "$branch" --auto --squash || echo "::warning::Auto-merge not enabled; configure required status checks on main."

  update-models-dev-pricing:
    needs: update-pricing
    if: ${{ always() }}
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout (for local actions)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up git bot identity
        id: bot
        uses: ./.github/actions/setup-git-bot
        with:
          app-id: ${{ secrets.CCUSAGE_UPDATER_APP_ID }}
          private-key: ${{ secrets.CCUSAGE_UPDATER_APP_PRIVATE_KEY }}
      - name: Checkout (with bot token)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.bot.outputs.token }}
      - uses: ./.github/actions/setup-nix-cache
      - name: Update models.dev input
        run: |
          nix flake update models-dev
      - name: Regenerate committed models.dev pricing snapshot
        run: |
          nix develop --command just gen-models-dev-pricing
      - name: Skip lock-only models.dev updates
        run: |
          # Only the compacted snapshot affects the build; if a models.dev bump
          # leaves the Anthropic pricing unchanged, drop the lock-only churn.
          if git diff --quiet -- rust/crates/ccusage/src/models-dev-pricing.json; then
            echo "models.dev pricing snapshot is unchanged; skipping PR."
            git checkout -- flake.lock rust/crates/ccusage/src/models-dev-pricing.json
          fi
      - name: Validate updated pricing snapshot
        run: |
          if git diff --quiet; then
            echo "Pricing snapshot is already up to date."
            exit 0
          fi
          nix develop --command just check
      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
        run: |
          if git diff --quiet; then
            echo "Pricing snapshot is already up to date."
            exit 0
          fi

          branch="automation/models-dev-pricing"
          git checkout -B "$branch"
          git add flake.lock rust/crates/ccusage/src/models-dev-pricing.json
          git commit -m "chore(pricing): update models.dev snapshot"
          git push --force origin "$branch"

          body="$(printf '%s\n' \
            'Updates the pinned models.dev input and its committed pricing snapshot.' \
            '' \
            'Validation:' \
            '- just check')"

          if gh pr view "$branch" >/dev/null 2>&1; then
            printf '%s\n' "$body" | gh pr edit "$branch" --title "chore(pricing): update models.dev snapshot" --body-file -
          else
            printf '%s\n' "$body" | gh pr create --base main --head "$branch" --title "chore(pricing): update models.dev snapshot" --body-file -
          fi

          gh pr merge "$branch" --auto --squash || echo "::warning::Auto-merge not enabled; configure required status checks on main."

  update-publint:
    needs: update-models-dev-pricing
    if: ${{ always() }}
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout (for local actions)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up git bot identity
        id: bot
        uses: ./.github/actions/setup-git-bot
        with:
          app-id: ${{ secrets.CCUSAGE_UPDATER_APP_ID }}
          private-key: ${{ secrets.CCUSAGE_UPDATER_APP_PRIVATE_KEY }}
      - name: Checkout (with bot token)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.bot.outputs.token }}
      - uses: ./.github/actions/setup-nix-cache
      - name: Update pinned publint CLI
        run: |
          # Regenerates nix/publint-package-lock.json and bumps the version +
          # npmDepsHash in nix/publint.nix to the latest release on npm.
          nix develop --command just update-publint
      - name: Skip when already up to date
        run: |
          if git diff --quiet -- nix/publint.nix nix/publint-package-lock.json; then
            echo "publint is already up to date; skipping PR."
            git checkout -- nix/publint.nix nix/publint-package-lock.json
          fi
      - name: Validate updated package
        run: |
          if git diff --quiet; then
            echo "publint is already up to date."
            exit 0
          fi
          nix develop --command just check
      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
        run: |
          if git diff --quiet; then
            echo "publint is already up to date."
            exit 0
          fi

          branch="automation/publint"
          git checkout -B "$branch"
          git add nix/publint.nix nix/publint-package-lock.json
          version="$(nix eval --raw .#publint.version)"
          git commit -m "chore(deps): update publint to ${version}"
          git push --force origin "$branch"

          body="$(printf '%s\n' \
            'Updates the pinned publint CLI used by the dev shell and flake checks.' \
            '' \
            'Validation:' \
            '- just check')"

          if gh pr view "$branch" >/dev/null 2>&1; then
            printf '%s\n' "$body" | gh pr edit "$branch" --title "chore(deps): update publint to ${version}" --body-file -
          else
            printf '%s\n' "$body" | gh pr create --base main --head "$branch" --title "chore(deps): update publint to ${version}" --body-file -
          fi

          gh pr merge "$branch" --auto --squash || echo "::warning::Auto-merge not enabled; configure required status checks on main."
